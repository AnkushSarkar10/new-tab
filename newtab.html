<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Album New Tab</title>
    <link rel="stylesheet" href="styles/newtab.css">
  </head>
  <body>
    <main class="stage" aria-live="polite">
      <img id="background-image" class="background-image" alt="">
      <div id="image-scrim" class="image-scrim"></div>

      <section class="topbar" aria-label="New tab controls">
        <div class="album-menu-wrap">
          <button
            id="album-menu-button"
            class="album-chip"
            type="button"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            <span id="album-name">kanye</span>
            <span id="image-count">0</span>
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </button>
          <div id="album-menu" class="album-menu" role="menu" aria-hidden="true">
            <div id="album-menu-list" class="album-menu-list" role="list"></div>
            <button id="new-album-button" class="new-album-button" type="button" role="menuitem">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
              </svg>
              <span>New Album</span>
            </button>
          </div>
        </div>
        <div class="control-group">
          <button id="shuffle-button" class="icon-button" type="button" aria-label="Show another image" title="Shuffle">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M16 3h5v5"></path>
              <path d="M4 20 21 3"></path>
              <path d="M21 16v5h-5"></path>
              <path d="m15 15 6 6"></path>
              <path d="m4 4 5 5"></path>
            </svg>
          </button>
          <button id="settings-button" class="icon-button" type="button" aria-label="Open settings" title="Settings">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
              <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2.2 2.2 0 0 1-3.11 3.11l-.04-.04a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.09 1.65V21.5a2.2 2.2 0 0 1-4.4 0v-.06a1.8 1.8 0 0 0-1.18-1.68 1.8 1.8 0 0 0-1.98.36l-.04.04a2.2 2.2 0 0 1-3.11-3.11l.04-.04a1.8 1.8 0 0 0 .36-1.98 1.8 1.8 0 0 0-1.65-1.09H1.5a2.2 2.2 0 0 1 0-4.4h.06a1.8 1.8 0 0 0 1.68-1.18 1.8 1.8 0 0 0-.36-1.98l-.04-.04a2.2 2.2 0 0 1 3.11-3.11l.04.04a1.8 1.8 0 0 0 1.98.36h.01A1.8 1.8 0 0 0 9.06 1.8V1.5a2.2 2.2 0 0 1 4.4 0v.06a1.8 1.8 0 0 0 1.09 1.65 1.8 1.8 0 0 0 1.98-.36l.04-.04a2.2 2.2 0 0 1 3.11 3.11l-.04.04a1.8 1.8 0 0 0-.36 1.98v.01A1.8 1.8 0 0 0 21 9.06h.06a2.2 2.2 0 0 1 0 4.4H21a1.8 1.8 0 0 0-1.6 1.54Z"></path>
            </svg>
          </button>
        </div>
      </section>

      <aside id="settings-panel" class="settings-panel" aria-label="Album settings" aria-hidden="true">
        <header class="panel-header">
          <h1>Settings</h1>
          <button id="close-settings-button" class="icon-button" type="button" aria-label="Close settings" title="Close">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </header>

        <section id="editor" class="editor" aria-label="Selected album">
          <div class="section-title">
            <h2 id="editor-title">kanye</h2>
            <button id="delete-album-button" class="text-button danger" type="button">Delete</button>
          </div>

          <label class="field">
            <span>Image URLs</span>
            <textarea id="image-url-input" rows="3" placeholder="https://example.com/image.jpg"></textarea>
          </label>
          <div class="row-actions">
            <button id="add-url-button" class="secondary-button" type="button">Add URLs</button>
            <label class="file-button">
              <input id="image-file-input" type="file" accept="image/*" multiple>
              <span>Add Files</span>
            </label>
          </div>

          <div id="image-list" class="image-list" role="list"></div>
        </section>
      </aside>
    </main>
    <script src="scripts/newtab.js"></script>
  </body>
</html>
