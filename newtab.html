<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>new tab</title>
    <link rel="stylesheet" href="styles/newtab.css">
  </head>
  <body>
    <main class="stage" aria-live="polite">
      <iframe
        id="website-background"
        class="website-background"
        title="Website background"
        aria-hidden="true"
        tabindex="-1"
        referrerpolicy="no-referrer"
        sandbox="allow-scripts allow-same-origin"
      ></iframe>
      <img id="background-image" class="background-image" alt="">
      <img id="background-image-next" class="background-image" alt="" aria-hidden="true">
      <div id="image-scrim" class="image-scrim"></div>

      <section class="topbar" aria-label="New tab controls">
        <div class="album-menu-wrap">
          <button
            id="album-menu-button"
            class="album-chip"
            type="button"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            <span id="album-name">kanye</span>
            <span id="image-count">0</span>
          </button>
          <div id="album-menu" class="album-menu" role="menu" aria-hidden="true">
            <div id="album-menu-list" class="album-menu-list" role="list"></div>
            <button id="new-album-button" class="new-album-button" type="button" role="menuitem">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
              </svg>
              <span>new album</span>
            </button>
          </div>
        </div>
        <div class="control-group">
          <button id="shuffle-button" class="icon-button" type="button" aria-label="Show another image" title="Shuffle">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="m18 14 4 4-4 4"></path>
              <path d="m18 2 4 4-4 4"></path>
              <path d="M2 18h1.973a4 4 0 0 0 3.3-1.7l5.454-8.6a4 4 0 0 1 3.3-1.7H22"></path>
              <path d="M2 6h1.972a4 4 0 0 1 3.6 2.2"></path>
              <path d="M22 18h-6.041a4 4 0 0 1-3.3-1.8l-.359-.45"></path>
            </svg>
          </button>
          <button id="settings-button" class="icon-button" type="button" aria-label="Open settings" title="Settings">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
              <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2.2 2.2 0 0 1-3.11 3.11l-.04-.04a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.09 1.65V21.5a2.2 2.2 0 0 1-4.4 0v-.06a1.8 1.8 0 0 0-1.18-1.68 1.8 1.8 0 0 0-1.98.36l-.04.04a2.2 2.2 0 0 1-3.11-3.11l.04-.04a1.8 1.8 0 0 0 .36-1.98 1.8 1.8 0 0 0-1.65-1.09H1.5a2.2 2.2 0 0 1 0-4.4h.06a1.8 1.8 0 0 0 1.68-1.18 1.8 1.8 0 0 0-.36-1.98l-.04-.04a2.2 2.2 0 0 1 3.11-3.11l.04.04a1.8 1.8 0 0 0 1.98.36h.01A1.8 1.8 0 0 0 9.06 1.8V1.5a2.2 2.2 0 0 1 4.4 0v.06a1.8 1.8 0 0 0 1.09 1.65 1.8 1.8 0 0 0 1.98-.36l.04-.04a2.2 2.2 0 0 1 3.11 3.11l-.04.04a1.8 1.8 0 0 0-.36 1.98v.01A1.8 1.8 0 0 0 21 9.06h.06a2.2 2.2 0 0 1 0 4.4H21a1.8 1.8 0 0 0-1.6 1.54Z"></path>
            </svg>
          </button>
        </div>
      </section>

      <aside id="settings-panel" class="settings-panel" aria-label="Settings" aria-hidden="true">
        <header class="panel-header">
          <h1>settings</h1>
          <button id="close-settings-button" class="icon-button" type="button" aria-label="Close settings" title="Close">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </header>

        <section class="settings-section" aria-label="General">
          <div class="section-title">
            <h2>general</h2>
          </div>
          <label id="website-background-url-field" class="field website-url-field">
            <span>website URL</span>
            <input id="website-background-url-input" type="url" placeholder="https://example.com" autocomplete="off">
          </label>
          <label class="toggle-field">
            <span>
              <strong>auto play</strong>
              <small>show another image automatically</small>
            </span>
            <input id="auto-play-input" type="checkbox">
          </label>
          <label id="auto-play-interval-field" class="field interval-field" hidden>
            <span>auto play interval (seconds)</span>
            <input id="auto-play-interval-input" type="number" min="5" step="1" inputmode="numeric">
          </label>
          <label class="field slider-field">
            <span>image transition - <output id="image-transition-duration-value">1400ms</output></span>
            <input id="image-transition-duration-input" type="range" min="200" max="3000" step="100">
          </label>
        </section>

        <section class="settings-section" aria-label="Albums">
          <div class="section-title">
            <h2>albums</h2>
          </div>
          <p class="section-hint">add or edit albums from the album menu. You must keep at least one album.</p>
          <div id="album-admin-list" class="album-admin-list" role="list"></div>
        </section>
      </aside>

      <aside id="album-editor-panel" class="settings-panel" aria-label="Edit album" aria-hidden="true">
        <header class="panel-header">
          <h1>edit album</h1>
          <button id="close-editor-button" class="icon-button" type="button" aria-label="Close editor" title="Close">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </header>

        <section class="editor" aria-label="Album editor">
          <label class="field">
            <span>album name</span>
            <input id="album-name-input" type="text" placeholder="Album name" autocomplete="off">
          </label>
          <label class="field">
            <span>image URLs</span>
            <textarea id="image-url-input" rows="3" placeholder="https://example.com/image.jpg"></textarea>
          </label>
          <div class="row-actions">
            <button id="add-url-button" class="secondary-button" type="button">add URLs</button>
            <label class="file-button">
              <input id="image-file-input" type="file" accept="image/*" multiple>
              <span>add files</span>
            </label>
          </div>

          <div id="image-list" class="image-list" role="list"></div>
        </section>
      </aside>
    </main>
    <script src="scripts/default-albums.js"></script>
    <script src="scripts/newtab.js"></script>
  </body>
</html>
